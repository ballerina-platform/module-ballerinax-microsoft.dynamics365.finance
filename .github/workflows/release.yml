name: Publish Release

on:
  workflow_dispatch:
    inputs:
      connector:
        type: choice
        description: Select Connector
        required: true
        options:
          - ledger
          - receivable
          - payable
          - tax
          - asset
          - core
          - hr
          - system

jobs:
  release:
    name: Release Package
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ballerina-platform' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Get Ballerina Version
        run: |
          BAL_VERSION=$(grep -w 'ballerinaLangVersion' gradle.properties | cut -d= -f2 | rev | cut --complement -d- -f1 | rev)
          if [ -z "$BAL_VERSION" ]; then BAL_VERSION="latest"; fi
          echo "BAL_VERSION=$BAL_VERSION" >> $GITHUB_ENV

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: ${{ env.BAL_VERSION }}

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21.0.3

      - name: Sync root version to connector version
        run: |
          git config --global user.name ${{ secrets.BALLERINA_BOT_USERNAME }}
          git config --global user.email ${{ secrets.BALLERINA_BOT_EMAIL }}
          CONNECTOR_VERSION=$(grep -w '${{ inputs.connector }}Version' gradle.properties | cut -d= -f2)
          CURRENT_VERSION=$(grep -w '^version' gradle.properties | cut -d= -f2)
          if [[ "$CURRENT_VERSION" != "$CONNECTOR_VERSION" ]]; then
            sed -i "s/^version=.*/version=$CONNECTOR_VERSION/" gradle.properties
            git commit -m "[Automated] Sync version to ${{ inputs.connector }} $CONNECTOR_VERSION" gradle.properties
          fi

      - name: Build without tests
        env:
          packageUser: ${{ github.actor }}
          packagePAT: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :microsoft.dynamics365.finance-ballerina-${{ inputs.connector }}:build -x test -PbuildUsingDocker=nightly

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db,public.ecr.aws/aquasecurity/trivy-db
          TRIVY_JAVA_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-java-db,public.ecr.aws/aquasecurity/trivy-java-db
        with:
          scan-type: rootfs
          scan-ref: ${{ github.workspace }}/ballerina/${{ inputs.connector }}
          format: table
          timeout: 10m0s
          exit-code: "1"
          scanners: vuln
          cache-dir: /tmp/trivy-cache

      - name: Get release version
        run: |
          VERSION=$(grep -w '^version' gradle.properties | cut -d= -f2 | sed 's/-SNAPSHOT//')
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Checkout release branch
        run: |
          git checkout -b release-${{ inputs.connector }}-${VERSION}

      - name: Publish package
        env:
          GITHUB_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_ACCESS_TOKEN }}
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
          publishUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          publishPAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          ./gradlew :microsoft.dynamics365.finance-ballerina-${{ inputs.connector }}:release \
            -Prelease.useAutomaticVersion=true
          ./gradlew :microsoft.dynamics365.finance-ballerina-${{ inputs.connector }}:publish \
            -Pversion=${VERSION} -P${{ inputs.connector }}Version=${VERSION} \
            -x test -PpublishToCentral=true

      - name: GitHub release and sync PR
        env:
          GITHUB_TOKEN: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          git push origin release-${{ inputs.connector }}-${VERSION}
          gh release create ${{ inputs.connector }}-v${VERSION} \
            --title "${{ inputs.connector }}-v${VERSION}"
          gh pr create \
            --base ${GITHUB_REF##*/} \
            --title "[Automated] Sync ${GITHUB_REF##*/} after ${{ inputs.connector }}-${VERSION} release" \
            --body "Sync ${GITHUB_REF##*/} after ${{ inputs.connector }}-${VERSION} release"

name: Publish Single Connector to the Ballerina Dev/Stage Central

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Select Environment
        required: true
        options:
          - DEV CENTRAL
          - STAGE CENTRAL
      connector:
        type: choice
        description: Select Connector
        required: true
        options:
          - budget
          - cashmanagement
          - core
          - coreorg
          - customer
          - customeraccount
          - customermain
          - document
          - expense
          - fiscal
          - fixedasset
          - hr
          - hrdev
          - journalentry
          - ledger
          - mainaccount
          - payment
          - procurement
          - project
          - receivable
          - sysconfig
          - system
          - tax
          - taxregion
          - trade
          - users
          - vendor
          - vendorextended
          - vendorpayment
          - workflow

jobs:
  publish:
    name: Publish Connector
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ballerina-platform' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21.0.3

      - name: Get Ballerina Version
        run: |
          BAL_VERSION=$(grep -w 'ballerinaLangVersion' gradle.properties | cut -d= -f2 | rev | cut --complement -d- -f1 | rev)
          if [ -z "$BAL_VERSION" ]; then BAL_VERSION="latest"; fi
          echo "BAL_VERSION=$BAL_VERSION" >> $GITHUB_ENV

      - name: Set Up Ballerina
        uses: ballerina-platform/setup-ballerina@v1.1.0
        with:
          version: ${{ env.BAL_VERSION }}

      - name: Build and run tests
        env:
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          ./gradlew clean :microsoft.dynamics365.finance-ballerina:${{ inputs.connector }}:build

      - name: Publish to Dev Central
        if: ${{ inputs.environment == 'DEV CENTRAL' }}
        env:
          BALLERINA_DEV_CENTRAL: true
          BALLERINA_STAGE_CENTRAL: false
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_DEV_ACCESS_TOKEN }}
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          ./gradlew clean :microsoft.dynamics365.finance-ballerina:${{ inputs.connector }}:build \
            -x test -PpublishToCentral=true

      - name: Publish to Stage Central
        if: ${{ inputs.environment == 'STAGE CENTRAL' }}
        env:
          BALLERINA_DEV_CENTRAL: false
          BALLERINA_STAGE_CENTRAL: true
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_STAGE_ACCESS_TOKEN }}
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          ./gradlew clean :microsoft.dynamics365.finance-ballerina:${{ inputs.connector }}:build \
            -x test -PpublishToCentral=true

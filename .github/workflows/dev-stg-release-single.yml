name: Publish Single Connector to the Ballerina Dev/Stage Central

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Select Environment
        required: true
        options:
          - DEV CENTRAL
          - STAGE CENTRAL
      connector:
        type: choice
        description: Select Connector
        required: true
        options:
          - ledger
          - receivable
          - payable
          - tax
          - asset
          - core
          - hr
          - system

jobs:
  publish:
    name: Publish Connector
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'ballerina-platform' }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21.0.3

      - name: Cache Ballerina packages
        uses: actions/cache@v3
        with:
          path: ~/.ballerina
          key: ${{ runner.os }}-ballerina-${{ inputs.connector }}-${{ hashFiles(format('ballerina/{0}/Dependencies.toml', inputs.connector)) }}
          restore-keys: |
            ${{ runner.os }}-ballerina-${{ inputs.connector }}-
            ${{ runner.os }}-ballerina-

      - name: Publish to Dev Central
        if: ${{ inputs.environment == 'DEV CENTRAL' }}
        env:
          BALLERINA_DEV_CENTRAL: true
          BALLERINA_STAGE_CENTRAL: false
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_DEV_ACCESS_TOKEN }}
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          ./gradlew :microsoft.dynamics365.finance-ballerina:${{ inputs.connector }}:build \
            -x test -PbuildUsingDocker=nightly -PpublishToCentral=true

      - name: Publish to Stage Central
        if: ${{ inputs.environment == 'STAGE CENTRAL' }}
        env:
          BALLERINA_DEV_CENTRAL: false
          BALLERINA_STAGE_CENTRAL: true
          BALLERINA_CENTRAL_ACCESS_TOKEN: ${{ secrets.BALLERINA_CENTRAL_STAGE_ACCESS_TOKEN }}
          packageUser: ${{ secrets.BALLERINA_BOT_USERNAME }}
          packagePAT: ${{ secrets.BALLERINA_BOT_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          ./gradlew :microsoft.dynamics365.finance-ballerina:${{ inputs.connector }}:build \
            -x test -PbuildUsingDocker=nightly -PpublishToCentral=true

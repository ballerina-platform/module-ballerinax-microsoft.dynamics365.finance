import groovy.json.JsonSlurper
import org.apache.tools.ant.taskdefs.condition.Os

description = 'Ballerina - Microsoft Dynamics 365 Finance and Operations'

def ballerinaBuckets = ['ledger', 'receivable', 'payable', 'tax', 'asset', 'core', 'hr', 'system']
def projectName = 'microsoft.dynamics365.finance'

subprojects {
    ext {
        packageOrg = "ballerinax"
        ballerinaTomlFilePlaceHolder = new File("${project.rootDir}/build-config/resources/${project.name}/Ballerina.toml")
    }
}

def readmeMdPlaceholder = new File("${project.rootDir}/build-config/resources/README.md")

task updateDocumentationFiles {
    doLast {
        for (String bucket in ballerinaBuckets) {
            def docsJsonFile = new File("${project.rootDir}/ballerina/${bucket}/docs.json")
            def parsedJson = new JsonSlurper().parseText(docsJsonFile.text)

            def readmeMdFile = new File("${project.rootDir}/ballerina/${bucket}/README.md")
            def pkgName = "${projectName}.${bucket}"

            def newReadme = readmeMdPlaceholder.text
            newReadme = newReadme.replace("@package-name@", pkgName)
            newReadme = newReadme.replace("@description@", parsedJson.description)
            newReadme = newReadme.replace("@key-features@", parsedJson."key-features".collect { "- ${it}" }.join("\n"))
            newReadme = newReadme.replace("@communication-scenario@", parsedJson."communication-scenario")
            newReadme = newReadme.replace("@import-statement@", parsedJson."import-statement")
            newReadme = newReadme.replace("@client-init@", parsedJson."client-init")
            newReadme = newReadme.replace("@api-invocation@", parsedJson."api-invocation")
            readmeMdFile.text = newReadme
        }

        project.exec {
            ignoreExitValue true
            if (Os.isFamily(Os.FAMILY_WINDOWS)) {
                commandLine 'cmd', '/c', "git commit -m \"[Automated] Update the documentation files\" */README.md"
            } else {
                commandLine 'sh', '-c', "git commit -m '[Automated] Update the documentation files' */README.md"
            }
        }
    }
}

task build {
    dependsOn(updateDocumentationFiles)
    ballerinaBuckets.each { bucket ->
        dependsOn(":${projectName}-ballerina-${bucket}:build")
    }
}

publishToMavenLocal.dependsOn build
publish.dependsOn build
